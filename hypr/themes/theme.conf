
$GTK_THEME = Catppuccin-Mocha
$ICON_THEME = Papirus-Dark
$CURSOR_THEME = Bibata-Modern-Ice
$CURSOR_SIZE = 20
$COLOR_SCHEME = prefer-dark


general {
    gaps_in = 3
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(22c55eee) rgba(22c55ecc) 45deg
    col.inactive_border = rgba(1e1e1ecc) rgba(2d2d2dcc) 45deg
    layout = dwindle
    resize_on_border = true
}

group {
    col.border_active = rgba(22c55eee) rgba(22c55ecc) 45deg
    col.border_inactive = rgba(1e1e1ecc) rgba(2d2d2dcc) 45deg
    col.border_locked_active = rgba(22c55eee) rgba(22c55ecc) 45deg
    col.border_locked_inactive = rgba(1e1e1ecc) rgba(2d2d2dcc) 45deg
}

decoration {
    rounding = 5
    blur { enabled = yes; size = 5; passes = 2; }
}

layerrule = blur,waybar
